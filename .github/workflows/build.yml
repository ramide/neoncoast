name: Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev
      - name: Configure
        continue-on-error: true
        id: configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release > cmake_log.txt 2>&1
      - name: Build
        continue-on-error: true
        id: build
        run: cmake --build build > build_log.txt 2>&1
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neoncoast-linux-logs
          path: '*.txt'
