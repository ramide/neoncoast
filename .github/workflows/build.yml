name: Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: neoncoast-windows
          path: build/Release/neoncoast.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: neoncoast-linux
          path: build/neoncoast

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: neoncoast-macos
          path: build/neoncoast
